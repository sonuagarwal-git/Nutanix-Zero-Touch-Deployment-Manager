<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nutanix Cluster Deployment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            width: 100%;
            background-color: #4a7fa5;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Full-screen background layer — works perfectly regardless of image resolution */
        .bg-layer {
            position: fixed;
            inset: 0;              /* top:0; right:0; bottom:0; left:0 */
            width: 100vw;
            height: 100vh;
            background-image: url('/images/login-bg.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-color: #4a7fa5; /* fallback if image missing */
            z-index: 0;
        }

        body::before {
            display: none; /* bg-layer div handles the background */
        }

        .login-wrapper {
            display: flex;
            width: 750px;
            height: 450px;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            z-index: 10;  /* sits above bg-layer (z-index: 0) */
        }

        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #5a6a7d 0%, #4a5a6d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.03) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.03) 75%);
            background-size: 40px 40px;
            opacity: 0.3;
        }

        .brand-text {
            font-size: 2rem;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 5px;
            text-align: center;
            z-index: 1;
            line-height: 1.3;
        }

        .right-panel {
            flex: 1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .company-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: #024da1;
            letter-spacing: 2px;
            margin-bottom: 22px;
            text-align: center;
            text-transform: uppercase;
        }

        .login-box {
            width: 100%;
            max-width: 300px;
        }

        .login-title {
            font-size: 1rem;
            color: #333333;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #333333;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cccccc;
            border-radius: 3px;
            font-size: 0.9rem;
            background: #ffffff;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a9eff;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666666;
            cursor: pointer;
            padding: 4px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: #333333;
        }

        .error-message {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            padding: 10px;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            background: #7ab8f5;
            color: #ffffff;
            border: none;
            border-radius: 3px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 5px;
        }

        .btn-login:hover {
            background: #5aa3e8;
        }

        .logo-fallback {
            display: none; /* login page uses .company-name instead */
        }

        .footer-text {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            z-index: 20;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <!-- Full-screen background: fixed-position div fills 100vw/100vh regardless of image resolution -->
    <div class="bg-layer"></div>

    <div class="login-wrapper">
        <div class="left-panel">
            <div class="brand-text">
                NUTANIX<br>CLUSTER<br>DEPLOYMENT<br>MANAGER
            </div>
        </div>
        
        <div class="right-panel">
            <div id="companyName" class="company-name">YOUR COMPANY</div>
            
            <div class="login-box">
                <h2 class="login-title">Log in with your Local Account or AD Account</h2>
                
                <div id="errorMessage" class="error-message"></div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="type your initial or local user name" required autocomplete="username" autofocus>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" required autocomplete="current-password">
                            <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
                                <span id="eyeIcon">👁️</span>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-login">Log In</button>
                </form>
            </div>
        </div>
    </div>

    <div class="footer-text">
        Nutanix Cluster Deployment Manager
    </div>

    <script>
        // Load company name from server config and apply to all fallback labels
        (async function applyBranding() {
            try {
                const r = await fetch('/api/branding');
                const { companyName } = await r.json();
                if (companyName) {
                    document.title = companyName + ' — Login';
                    const nameEl = document.getElementById('companyName');
                    if (nameEl) nameEl.textContent = companyName.toUpperCase();
                }
            } catch (e) { /* use static defaults */ }
        })();

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        function togglePassword() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁️';
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            errorMessage.classList.remove('show');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    errorMessage.textContent = data.error || 'Login failed';
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'An error occurred during login';
                errorMessage.classList.add('show');
            }
        });
    </script>
</body>
</html>
